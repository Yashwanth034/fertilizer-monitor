name: Check Urea Stock

on:
  schedule:
    # Tells GitHub to queue this every 5 minutes (Expect delays from GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to keep testing it manually

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run stock check
        run: python fertilizer_monitor_cloud.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}

      - name: Save updated stock state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dealer_state.json
          # Checks if changes exist before committing
          if ! git diff --cached --quiet; then
            git commit -m "Update dealer state"
            # Pull with rebase prevents errors if a manual run pushed a change recently
            git pull --rebase
            git push
          else
            echo "No changes detected in dealer_state.json"
          fi
